version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hanja-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  backend:
    build: .
    container_name: hanja-backend
    ports:
      - "3000:3000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    restart: unless-stopped

volumes:
  redis-data:
